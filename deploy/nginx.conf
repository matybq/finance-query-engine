# Live VPS server block for finance-query-engine.
# Serves the built web UI (frontend/dist) at / and proxies the
# loopback-bound API container under /api/.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /var/www/finance-query-engine;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Vite emits content-hashed filenames, so build assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
