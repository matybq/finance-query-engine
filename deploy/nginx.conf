# Live VPS server block for finance-query-engine, behind Cloudflare.
# TLS terminates at Cloudflare's edge (SSL mode: Full strict); the origin
# serves a Cloudflare Origin CA certificate. Serves the built web UI
# (frontend/dist) at / and proxies the loopback-bound API under /api/.
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name finance.locus.com.ar;

    ssl_certificate     /etc/ssl/cloudflare/locus.com.ar.pem;
    ssl_certificate_key /etc/ssl/cloudflare/locus.com.ar.key;

    root /var/www/finance-query-engine;
    index index.html;

    location / {
        try_files $uri /index.html;
    }

    # Vite emits content-hashed filenames, so build assets are immutable.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# Plain HTTP (direct IP hits and anything unmatched): send to the
# canonical domain.
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 301 https://finance.locus.com.ar$request_uri;
}
