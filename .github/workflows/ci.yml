name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-checks:
    name: Python checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --extra eval --group dev

      - name: Lint
        run: uv run --locked --extra eval --group dev ruff check src evals tests

      - name: Check formatting
        run: uv run --locked --extra eval --group dev ruff format --check src evals tests

      - name: Type-check
        run: uv run --locked --extra eval --group dev mypy

      - name: Smoke-test RAGAS imports
        run: uv run --locked --extra eval --group dev python -c "from evals.evaluate_ragas import import_ragas; import_ragas(); print('ragas imports ok')"

      - name: Run unit tests
        run: uv run --locked --extra eval --group dev pytest
