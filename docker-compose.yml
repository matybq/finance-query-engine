services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    volumes:
      # The prebuilt index (Chroma + chunks.jsonl); run ingestion before starting.
      # Not read-only: Chroma's sqlite needs write access (WAL/journal) even to serve reads.
      - ./data/processed:/app/data/processed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
